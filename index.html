<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ACERTE O CHICLETÃO!</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Boogaloo&family=Permanent+Marker&display=swap");

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: "Boogaloo", cursive;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  user-select: none;
  position: relative;
  overflow: hidden;
  background: #0d0010;
  cursor: none;
}

/* ── Custom bubblegum crosshair cursor ─────────────────────────────────── */
#cursor {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: transform 0.04s;
}
#cursor.fired { transform: translate(-50%,-50%) scale(0.8); }

/* ── Animated gum background ────────────────────────────────────────────── */
#gum-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background: #1a0520;
}
.gum-piece {
  position: absolute;
  border-radius: 40% 60% 55% 45% / 45% 55% 60% 40%;
  animation: gumFloat linear infinite;
}
@keyframes gumFloat {
  0%   { transform: translateY(110vh) rotate(0deg);   border-radius: 40% 60% 55% 45% / 45% 55% 60% 40%; }
  50%  { transform: translateY(45vh)  rotate(180deg); border-radius: 55% 45% 40% 60% / 60% 40% 55% 45%; }
  100% { transform: translateY(-15vh) rotate(360deg); border-radius: 40% 60% 55% 45% / 45% 55% 60% 40%; }
}

/* ── Page content ─────────────────────────────────────────────────────── */
h1, #hud, #game-wrap, #scoreboard { position: relative; z-index: 2; }

h1 {
  font-family: "Permanent Marker", cursive;
  font-size: 44px;
  color: #fff;
  text-shadow:
    3px 3px 0 #c2185b,
    -1px -1px 0 #880e4f,
    0 0 28px rgba(255,105,180,0.9),
    0 0 55px rgba(255,105,180,0.4);
  letter-spacing: 3px;
}

#hud { display:flex; gap:14px; }
.pill {
  background: rgba(30,0,20,0.82);
  border: 2px solid #e91e8c;
  border-radius: 8px;
  padding: 6px 22px;
  font-size: 22px;
  color: #fff;
  box-shadow: 0 0 12px rgba(233,30,140,0.55), inset 0 0 8px rgba(233,30,140,0.08);
  min-width: 100px;
  text-align: center;
  backdrop-filter: blur(5px);
}
.pill span { font-size:12px; display:block; color:#f48fb1; text-transform:uppercase; letter-spacing:1px; }
#timer.urgent { color:#ff5252; text-shadow:0 0 14px #ff5252; animation:blink .4s infinite; }
@keyframes blink { 50% { opacity:.25; } }

/* ── Gum border ──────────────────────────────────────────────────────────── */
#game-wrap { position:relative; padding:14px; border-radius:28px; }
#game-wrap::before {
  content:"";
  position:absolute; inset:-12px; border-radius:30px;
  background:
    radial-gradient(ellipse 60% 30% at 20% 10%, #c2185b 0%, transparent 70%),
    radial-gradient(ellipse 40% 50% at 80% 20%, #880e4f 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 50% 85%, #6a0f3a 0%, transparent 70%),
    radial-gradient(ellipse 35% 60% at 8%  60%, #d81b60 0%, transparent 60%),
    radial-gradient(ellipse 45% 35% at 92% 70%, #c2185b 0%, transparent 60%),
    #880e4f;
  z-index:-1;
  filter: url(#gum-filter);
}

/* ── Target ──────────────────────────────────────────────────────────────── */
#target {
  position: absolute;
  /* tall sprite — keep aspect ratio, fix width */
  width: 72px;
  height: auto;
  display: none;
  cursor: none;
  /* anchor at feet */
  transform: translate(-50%, -100%);
  z-index: 3;
  filter: drop-shadow(0 0 10px rgba(255,105,180,0.85)) drop-shadow(0 4px 10px rgba(0,0,0,0.7));
  transform-origin: center bottom;
}
#target.popin { animation: popIn .2s cubic-bezier(.34,1.56,.64,1) forwards; }
@keyframes popIn {
  from { transform: translate(-50%,-100%) scale(0) rotate(-10deg); }
  to   { transform: translate(-50%,-100%) scale(1) rotate(0deg); }
}
#target img { width:100%; height:auto; display:block; }

/* Screens */
.screen {
  position:absolute; inset:0;
  background: rgba(10,0,18,0.90);
  border-radius:16px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:14px; z-index:10; backdrop-filter:blur(6px);
}
.screen.hidden { display:none; }
.screen h2 {
  font-family:"Permanent Marker",cursive; font-size:32px; color:#fff;
  text-shadow:2px 2px 0 #c2185b, 0 0 20px rgba(255,105,180,0.8); text-align:center;
}
.screen p { font-size:16px; color:#f48fb1; text-align:center; max-width:300px; line-height:1.5; }
.big {
  font-family:"Permanent Marker",cursive; font-size:76px; color:#fff;
  text-shadow:3px 3px 0 #c2185b, 0 0 30px rgba(255,105,180,0.7); line-height:1;
}

.btn {
  font-family:"Boogaloo",cursive; font-size:22px;
  background:#c2185b; color:#fff; border:none; border-radius:8px;
  padding:10px 36px;
  box-shadow:0 4px 0 #880e4f, 0 0 18px rgba(194,24,91,0.6);
  cursor:none; letter-spacing:1px; transition:all .12s;
}
.btn:hover  { transform:translateY(-2px); box-shadow:0 6px 0 #880e4f, 0 0 28px rgba(194,24,91,0.8); }
.btn:active { transform:translateY(2px);  box-shadow:0 2px 0 #880e4f; }
.btn.secondary {
  background:transparent; color:#f48fb1; border:2px solid #f48fb1;
  box-shadow:0 0 12px rgba(244,143,177,0.4); font-size:18px; padding:7px 26px;
}
.btn.secondary:hover { background:rgba(244,143,177,0.1); }

#name-input {
  font-family:"Boogaloo",cursive; font-size:20px;
  padding:8px 20px; border:2px solid #e91e8c; border-radius:8px;
  background:rgba(10,0,18,0.8); color:#fff; outline:none;
  text-align:center; width:220px; box-shadow:0 0 10px rgba(233,30,140,0.3);
}
#name-input::placeholder { color:rgba(233,30,140,0.4); }

/* Hit flash */
.hit-flash {
  position:absolute; pointer-events:none;
  font-family:"Permanent Marker",cursive; font-size:28px; color:#fff;
  text-shadow:2px 2px 0 #c2185b, 0 0 12px rgba(255,105,180,0.9);
  animation:rise .75s ease-out forwards; z-index:5;
  transform:translate(-50%,-50%); white-space:nowrap;
}
@keyframes rise {
  0%   { opacity:1; transform:translate(-50%,-50%) scale(1); }
  100% { opacity:0; transform:translate(-50%,-150%) scale(1.4); }
}

/* Scoreboard */
#scoreboard {
  background:rgba(20,0,15,0.82); border:2px solid #e91e8c; border-radius:12px;
  box-shadow:0 0 20px rgba(233,30,140,0.3), 0 4px 0 #880e4f;
  padding:14px 24px; width:648px; backdrop-filter:blur(6px);
}
#scoreboard h3 {
  font-family:"Permanent Marker",cursive; font-size:20px; color:#fff;
  text-align:center; margin-bottom:10px; letter-spacing:2px;
  text-shadow:0 0 14px rgba(233,30,140,0.7);
}
#sb-list { list-style:none; display:flex; flex-direction:column; gap:5px; }
#sb-list li {
  display:flex; align-items:center; gap:10px;
  font-size:18px; color:#f8bbd0;
  border-bottom:1px solid rgba(233,30,140,0.2); padding-bottom:5px;
}
#sb-list li:last-child { border-bottom:none; }
.sb-rank { width:24px; color:#e91e8c; font-weight:bold; }
.sb-name { flex:1; }
.sb-pts  { font-size:20px; color:#fff; text-shadow:0 0 8px rgba(233,30,140,0.6); }
.sb-date { font-size:13px; opacity:.35; margin-left:4px; }
.sb-empty { text-align:center; color:rgba(233,30,140,0.4); font-size:16px; padding:4px 0; }
</style>

      <h2>ACERTE O CHICLETÃO!</h2>

      <h2>FIM DE JOGO!</h2>

<div id="scoreboard">
  <h3>MELHORES PONTUACOES</h3>
  <ul id="sb-list"><li class="sb-empty">Nenhuma pontuacao ainda</li></ul>
</div>

<script>
// ── Custom cursor ──────────────────────────────────────────────────────────
const cursorEl = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
});
document.addEventListener('mousedown', () => {
  cursorEl.classList.add('fired');
  setTimeout(() => cursorEl.classList.remove('fired'), 120);
});

// ── Animated gum pieces ────────────────────────────────────────────────────
(function(){
  const bg = document.getElementById('gum-bg');
  const colors = [
    ['#c2185b','#880e4f'],['#e91e8c','#ad1457'],['#f06292','#c2185b'],
    ['#d81b60','#880e4f'],['#f48fb1','#e91e8c'],['#ad1457','#6a0f3a'],
  ];
  for(let i=0;i<22;i++){
    const el=document.createElement('div'); el.className='gum-piece';
    const [c1,c2]=colors[i%colors.length];
    const w=28+Math.random()*42, h=w*(0.36+Math.random()*0.3);
    el.style.cssText=`
      width:${w}px;height:${h}px;left:${Math.random()*100}%;
      background:linear-gradient(135deg,${c1},${c2});
      box-shadow:inset -3px -3px 6px rgba(0,0,0,0.3),inset 2px 2px 5px rgba(255,255,255,0.1);
      animation-duration:${7+Math.random()*11}s;
      animation-delay:${-Math.random()*16}s;
      opacity:${0.5+Math.random()*0.4};
    `;
    bg.appendChild(el);
  }
})();

// ── Game state ─────────────────────────────────────────────────────────────
let score=0, timeLeft=30, level=1, running=false;
let timerInterval=null, hideTimeout=null, lastX=-999, lastY=-999;
let bounceRaf=null;

const target  = document.getElementById('target');
const chicImg = document.getElementById('chic-img');
const scoreEl = document.getElementById('score');
const timerEl = document.getElementById('timer');
const levelEl = document.getElementById('level');
const gameArea= document.getElementById('game-area');

// ── Chicletão idle bounce animation ───────────────────────────────────────
function startBounce(){
  cancelAnimationFrame(bounceRaf);
  let t=0;
  function frame(){
    t+=0.055;
    const sy = 1 + Math.sin(t)*0.045;
    const sx = 1 - Math.sin(t)*0.025;
    const r  = Math.sin(t*0.65)*6;
    // anchor transform at bottom (translate -100% already applied by CSS)
    chicImg.style.transform = `scaleX(${sx}) scaleY(${sy}) rotate(${r}deg)`;
    bounceRaf=requestAnimationFrame(frame);
  }
  frame();
}
function stopBounce(){
  cancelAnimationFrame(bounceRaf);
  chicImg.style.transform='';
}

// ── Spawn ──────────────────────────────────────────────────────────────────
function getLifetime(){ return Math.max(900,2400-(level-1)*250); }

function spawnTarget(){
  if(!running)return;
  const marginX=50, marginY=80; // extra Y because sprite anchors at feet
  const aW=gameArea.clientWidth, aH=gameArea.clientHeight;
  let x,y,tries=0;
  do{
    x=marginX+Math.random()*(aW-marginX*2);
    y=marginY+Math.random()*(aH-marginY);
    tries++;
  } while(Math.hypot(x-lastX,y-lastY)<140&&tries<20);
  lastX=x; lastY=y;

  target.style.left=x+'px';
  target.style.top =y+'px';
  target.style.display='block';
  target.classList.remove('popin');
  void target.offsetWidth;
  target.classList.add('popin');
  startBounce();

  clearTimeout(hideTimeout);
  hideTimeout=setTimeout(()=>{
    target.style.display='none';
    stopBounce();
    setTimeout(spawnTarget,280);
  }, getLifetime());
}

// ── Click target ──────────────────────────────────────────────────────────
target.addEventListener('click',e=>{
  if(!running)return;
  e.stopPropagation();
  clearTimeout(hideTimeout);
  target.style.display='none';
  stopBounce();

  const pts=10*level; score+=pts; scoreEl.textContent=score;

  const fl=document.createElement('div');
  fl.className='hit-flash'; fl.textContent='+'+pts;
  fl.style.left=lastX+'px'; fl.style.top=(lastY-60)+'px';
  gameArea.appendChild(fl); setTimeout(()=>fl.remove(),750);

  const newLevel=Math.min(6,1+Math.floor(score/60));
  if(newLevel>level){
    level=newLevel; levelEl.textContent=level;
    const lv=document.createElement('div'); lv.className='hit-flash';
    lv.textContent='NIVEL '+level+'!'; lv.style.left='50%'; lv.style.top='45%';
    lv.style.fontSize='30px'; gameArea.appendChild(lv); setTimeout(()=>lv.remove(),750);
  }
  setTimeout(spawnTarget,220);
});

// ── Timer ─────────────────────────────────────────────────────────────────
function startTimer(){
  timerInterval=setInterval(()=>{
    timeLeft--; timerEl.textContent=timeLeft;
    timerEl.classList.toggle('urgent',timeLeft<=6);
    if(timeLeft<=0)endGame();
  },1000);
}

// ── Start ─────────────────────────────────────────────────────────────────
function startGame(){
  score=0;timeLeft=30;level=1;
  scoreEl.textContent=0;timerEl.textContent=30;levelEl.textContent=1;
  timerEl.classList.remove('urgent');
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('over-screen').classList.add('hidden');
  document.getElementById('name-input').value='';
  document.getElementById('btn-save').textContent='Salvar pontuacao';
  document.getElementById('btn-save').disabled=false;
  running=true;
  spawnTarget();
  startTimer();
}

// ── End ───────────────────────────────────────────────────────────────────
function endGame(){
  running=false; clearInterval(timerInterval); clearTimeout(hideTimeout);
  stopBounce(); target.style.display='none';
  document.getElementById('final-score').textContent=score;
  let msg;
  if(score>=300)      msg='Mestre do Chicletao!';
  else if(score>=150) msg='Atirador Expert!';
  else if(score>=80)  msg='Bom de Mira!';
  else                msg='Continue tentando!';
  document.getElementById('rank-msg').textContent=msg;
  document.getElementById('over-screen').classList.remove('hidden');
  setTimeout(()=>document.getElementById('name-input').focus(),120);
}

// ── Scoreboard ────────────────────────────────────────────────────────────
function loadScores(){ try{return JSON.parse(localStorage.getItem('chicletao_scores')||'[]');}catch{return[];} }
function saveScore(name,pts){
  if(!pts)return;
  const s=loadScores();
  s.push({name:name||'Anonimo',pts,date:new Date().toLocaleDateString('pt-BR')});
  s.sort((a,b)=>b.pts-a.pts);
  const t=s.slice(0,5);
  localStorage.setItem('chicletao_scores',JSON.stringify(t));
  renderScoreboard(t);
}
function renderScoreboard(scores){
  const list=document.getElementById('sb-list');
  if(!scores.length){list.innerHTML='<li class="sb-empty">Nenhuma pontuacao ainda</li>';return;}
  list.innerHTML=scores.map((s,i)=>`
    <li>
      <span class="sb-rank">${i+1}.</span>
      <span class="sb-name">${s.name}<span class="sb-date">${s.date}</span></span>
      <span class="sb-pts">${s.pts} pts</span>
    </li>`).join('');
}
renderScoreboard(loadScores());

document.getElementById('btn-start').addEventListener('click',startGame);
document.getElementById('btn-save').addEventListener('click',()=>{
  const name=document.getElementById('name-input').value.trim();
  saveScore(name,score);
  document.getElementById('btn-save').textContent='Salvo!';
  document.getElementById('btn-save').disabled=true;
});
document.getElementById('name-input').addEventListener('keydown',e=>{
  if(e.key==='Enter')document.getElementById('btn-save').click();
});
document.getElementById('btn-restart').addEventListener('click',startGame);
</script>
